server:
  port: 8080

spring:
  application:
    name: notification-center
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: notification-center-group
    auto-offset-reset: earliest
  topics:
    notification.upstream.raw: notification.upstream.raw
    notification.channel.send: notification.channel.send
    notification.channel.retry: notification.channel.retry
    notification.channel.dead-letter: notification.channel.dead-letter

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

app:
  retry:
    max-attempts: 5
    initial-delay-ms: 10000
    multiplier: 3
  cleanup:
    retention-days: 180
