server:
  port: 8081

spring:
  application:
    name: notification-center
  profiles:
    active: dev
  flyway:
    enabled: false
    validate-on-migrate: false
  data:
    redis:
      host: 192.168.52.197
      port: 6379
      database: 0
      password: shengtong
      connect-timeout: 5000
      timeout: 5000

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.notification.model.entity
  type-handlers-package: com.notification.handler
  configuration:
    map-underscore-to-camel-case: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: notification-center-group
    auto-offset-reset: earliest
  admin:
    fail-fast: false
    properties:
      "default.api.timeout.ms": 3000
  topics:
    upstream-raw: notification.upstream.raw
    channel-send: notification.channel.send
    channel-retry: notification.channel.retry
    channel-dead-letter: notification.channel.dead-letter
    message-recall: notification.message.recall

# Channel-specific configuration
channel:
  dingtalk:
    webhook-url: ${DINGTALK_WEBHOOK_URL:}
  email:
    from: ${EMAIL_FROM:noreply@notification.com}
  sms:
    api-url: ${SMS_API_URL:}
    app-key: ${SMS_APP_KEY:}
    app-secret: ${SMS_APP_SECRET:}
  webhook:
    url: ${WEBHOOK_URL:}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}

# Rate limiting configuration (requests per second per channel)
ratelimit:
  sms: 20
  email: 100
  wechat: 50
  dingtalk: 200
  webhook: 500
  in-app: 5000

app:
  retry:
    max-attempts: 5
    initial-delay-ms: 10000
    multiplier: 3
  cleanup:
    retention-days: 180
